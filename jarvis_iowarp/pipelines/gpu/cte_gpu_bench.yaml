# CTE GPU Benchmark — single quick run
# Usage:
#   jarvis pipeline create gpu/cte_gpu_bench.yaml
#   jarvis pipeline run cte_gpu_bench

name: cte_gpu_bench

pkgs:
  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: gpu_local
    test_case: "putblob_gpu"
    rt_blocks: 8
    rt_threads: 32
    client_blocks: 32
    client_threads: 32
    io_size: "1m"
    iterations: 1024
    bdev_type: "hbm"
    timeout: 120
