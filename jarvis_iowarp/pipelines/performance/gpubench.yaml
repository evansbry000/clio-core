# GPU Runtime Latency Benchmark
# Purpose: Measure GPU task submission round-trip latency against the
#          Chimaera GPU work orchestrator for varying block and batch sizes
#
# bench_gpu_runtime is self-contained: it starts its own Chimaera runtime
# internally, so no wrp_runtime package is needed here.

config:
  name: gpu_bench
  pkgs:
    - pkg_type: jarvis_iowarp.wrp_gpu_bench
      pkg_name: gpu_bench
      rt_blocks: 1
      rt_threads: 32
      client_blocks: 1
      batch_size: 1
      total_tasks: 1000

vars:
  gpu_bench.client_blocks: [1, 2, 4, 8]
  gpu_bench.batch_size: [1, 4, 16, 64]

loop:
  - [gpu_bench.client_blocks, gpu_bench.batch_size]

repeat: 3

output: "${HOME}/gpu_bench_results"
